body:
  text: 魯司寇寄言遊於逡楚曰除乎司寇醬將見我門人既除而司寇不至諺言遊去司寇醬將焉往諺言遊曰食而弗與為禮是戰攻商工畜之也偃也修其德行以受戰攻商工之食於子於偃偽於子損於是乎何待
