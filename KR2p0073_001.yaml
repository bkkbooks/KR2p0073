body:
  text: 魯司寇寄言遊於逡楚曰除乎司寇𨟻將見我門人旣除而司寇不至𧧑言遊去司寇𨟻將焉往𧧑言遊曰食而弗與爲禮是戰攻商工畜之也偃也修其德行以受戰攻商工之食於子於偃僞於子損於是乎何待
  hash: sha256:72afbdc033fedb3fd2a0a8b7d19dcbf65ca3a36fcf1932e73b66e1b8b9986c0e
