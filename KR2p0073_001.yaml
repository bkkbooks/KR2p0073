body:
  text: 魯司寇寄言遊於逡楚曰除乎司寇𨟻將見我門人既除而司寇不至𧧑言遊去司寇𨟻將焉往𧧑言遊曰食而弗與為禮是戰攻商工畜之也偃也修其德行以受戰攻商工之食於子於偃僞於子損於是乎何待
  hash: sha256:09b47c62913e8c916a137493c58a1cd3c2a1053a5da0f6fc3d67f2941d2406d8
